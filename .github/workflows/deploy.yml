name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway link --url ${{ secrets.RAILWAY_URL }}
          railway deploy --force
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
