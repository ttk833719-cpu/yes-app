<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera - نعم</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 36px;
    }
    .camera-section {
      background: #222;
      border: 2px solid #667eea;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 500px;
      height: auto;
      border-radius: 10px;
      background: #000;
      margin: 20px 0;
    }
    canvas {
      display: none;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    button {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn-capture {
      background: #667eea;
      color: white;
    }
    .btn-capture:hover {
      background: #5568d3;
    }
    .btn-gallery {
      background: #764ba2;
      color: white;
      display: none;
    }
    .btn-gallery:hover {
      background: #653a8a;
    }
    .btn-home {
      background: #666;
      color: white;
    }
    .btn-home:hover {
      background: #555;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #333;
      border-radius: 8px;
      min-height: 40px;
    }
    .status.success {
      color: #51cf66;
      border: 1px solid #51cf66;
    }
    .status.error {
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }
    .status.loading {
      color: #ffd93d;
      border: 1px solid #ffd93d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 نعم Camera</h1>
    
    <div class="camera-section">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      
      <div class="button-group">
        <button class="btn-capture" onclick="capturePhoto()">Capture</button>
        <button class="btn-home" onclick="goHome()">Home</button>
      </div>
      
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    // Start camera
    window.addEventListener('load', () => {
      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user' },
        audio: false 
      })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.textContent = '✓ Camera ready';
        statusDiv.className = 'status success';
      })
      .catch(err => {
        statusDiv.textContent = '✗ Camera access denied: ' + err.message;
        statusDiv.className = 'status error';
      });
    });

    // Capture photo
    function capturePhoto() {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      statusDiv.textContent = '⏳ Processing...';
      statusDiv.className = 'status loading';

      canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('photo', blob, `photo_${Date.now()}.jpg`);

        fetch('/api/upload', {
          method: 'POST',
          body: formData
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            statusDiv.textContent = '✓ نعم';
            statusDiv.className = 'status success';
            statusDiv.style.fontSize = '32px';
            statusDiv.style.fontWeight = 'bold';
          } else {
            statusDiv.textContent = '✗ نعم';
            statusDiv.className = 'status error';
          }
        })
        .catch(err => {
          statusDiv.textContent = '✗ نعم';
          statusDiv.className = 'status error';
        });
      }, 'image/jpeg', 0.9);
    }

    function goHome() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
